<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>POST-deploy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:       #080b0f;
      --bg-surface:    #0d1117;
      --bg-elevated:   #131920;
      --bg-hover:      #1a2233;
      --border:        rgba(255,255,255,0.06);
      --border-focus:  rgba(99,160,255,0.35);
      --border-bright: rgba(255,255,255,0.12);

      --text-primary:  #e8edf5;
      --text-secondary:#7d8fa8;
      --text-muted:    #3d4f63;
      --text-code:     #a8c4e8;

      --accent:        #3b82f6;
      --accent-glow:   rgba(59,130,246,0.18);
      --accent-dim:    #1e3a5f;

      --green:         #22c55e;
      --green-dim:     rgba(34,197,94,0.12);
      --red:           #ef4444;
      --red-dim:       rgba(239,68,68,0.12);
      --orange:        #f97316;
      --orange-dim:    rgba(249,115,22,0.12);
      --yellow:        #eab308;
      --yellow-dim:    rgba(234,179,8,0.1);
      --blue:          #60a5fa;
      --blue-dim:      rgba(96,165,250,0.12);
      --purple:        #a78bfa;
      --purple-dim:    rgba(167,139,250,0.12);

      --radius-sm:     6px;
      --radius-md:     10px;
      --radius-lg:     14px;
      --radius-xl:     18px;

      --font-ui:    'DM Sans', sans-serif;
      --font-head:  'Syne', sans-serif;
      --font-mono:  'DM Mono', monospace;
    }

    body {
      width: 420px;
      height: 600px;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ───────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(59,130,246,0.04) 0%, transparent 100%);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    .brand-name {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .brand-name .accent { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .url-pill {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 20px;
      max-width: 140px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }
    .btn-clear:hover {
      border-color: var(--border-bright);
      color: var(--text-secondary);
      background: var(--bg-elevated);
    }

    /* ── Suggestions ─────────────────────────────────────────────────── */
    .suggestions {
      padding: 10px 14px 2px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }

    .chip {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 11px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      letter-spacing: 0.1px;
    }
    .chip:hover {
      background: var(--bg-hover);
      border-color: var(--border-bright);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    /* ── Messages ────────────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 2px;
    }

    /* ── Bubbles ─────────────────────────────────────────────────────── */
    .bubble {
      max-width: 88%;
      padding: 10px 13px;
      border-radius: var(--radius-lg);
      line-height: 1.6;
      word-break: break-word;
      font-size: 13px;
      animation: bubble-in 0.2s ease-out;
    }

    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble.user {
      background: linear-gradient(135deg, #1a3a6e 0%, #1e4080 100%);
      color: #c8dfff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(59,130,246,0.2);
    }

    .bubble.assistant {
      background: var(--bg-surface);
      color: var(--text-primary);
      align-self: flex-start;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble.error {
      background: var(--red-dim);
      color: #fca5a5;
      align-self: flex-start;
      border: 1px solid rgba(239,68,68,0.2);
      border-bottom-left-radius: 4px;
    }

    /* ── Tool badge ──────────────────────────────────────────────────── */
    .tool-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-head);
      font-size: 9px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .tool-badge.ghostscan {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.2);
    }
    .tool-badge.geocheck {
      background: var(--blue-dim);
      color: var(--blue);
      border: 1px solid rgba(96,165,250,0.2);
    }
    .tool-badge.both {
      background: var(--purple-dim);
      color: var(--purple);
      border: 1px solid rgba(167,139,250,0.2);
    }

    /* ── Progress feed — shared wrapper ──────────────────────────────── */
    .progress-feed {
      align-self: flex-start;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: 4px;
      padding: 10px 13px;
      max-width: 88%;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: opacity 0.6s;
      animation: bubble-in 0.2s ease-out;
    }

    /* ── Ghost scan header: globe + "Processing" + step lines ─────────── */
    .pf-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .pf-title {
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .pf-lines {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .progress-line {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      padding: 1px 0;
      transition: color 0.25s;
    }
    .progress-line.active { color: var(--text-secondary); }

    /* ── Geo scan loader: globe + italic wait text, no step lines ─────── */
    .geo-loader {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .geo-loader-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .geo-loader-label {
      font-size: 11px;
      font-style: italic;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .geo-loader-sub {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
    }

    /* ── Globe SVG spinner ───────────────────────────────────────────── */
    .globe-spin {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      animation: globe-rotate 2s linear infinite;
      opacity: 0.75;
    }

    /* Ghost scan uses smaller globe */
    .pf-header .globe-spin {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    @keyframes globe-rotate {
      0%   { transform: rotate(0deg);   }
      100% { transform: rotate(360deg); }
    }

    /* ── Spinner (kept for fallback) ─────────────────────────────────── */
    .spinner {
      width: 12px;
      height: 12px;
      border: 1.5px solid var(--bg-hover);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Geo grid ────────────────────────────────────────────────────── */
    .geo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .geo-item {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 9px 11px;
      font-size: 11px;
      transition: border-color 0.2s;
    }

    .geo-item .gi-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
    }

    .geo-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .geo-dot.pass    { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    .geo-dot.fail    { background: var(--red); }
    .geo-dot.timeout { background: var(--yellow); }
    .geo-dot.error   { background: var(--orange); }
    .geo-dot.pending { background: var(--text-muted); animation: pulse-dot 1.2s infinite; }

    .gi-flag { font-size: 13px; }
    .gi-name { color: var(--text-secondary); font-weight: 500; }

    .gi-time {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
    }

    .gi-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .gi-meta-line {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 10px;
      margin-top: 3px;
    }

    .gi-details {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .gi-issue {
      color: #f87171;
      font-size: 10px;
      line-height: 1.4;
    }

    .gi-legal {
      color: #fcd34d;
      font-size: 10px;
      line-height: 1.4;
    }

    .gi-cookie-desc {
      color: var(--text-muted);
      font-size: 10px;
      line-height: 1.4;
      font-style: italic;
    }

    .gi-tag {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
      width: fit-content;
    }
    .gi-tag-warn {
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .gi-tag-info {
      background: rgba(234,179,8,0.1);
      color: #fde68a;
      border: 1px solid rgba(234,179,8,0.15);
    }

    /* ── Findings ────────────────────────────────────────────────────── */
    .findings-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .finding-item {
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 9px 11px;
      border-left: 3px solid var(--border);
      transition: border-color 0.2s;
    }
    .finding-item.CRITICAL { border-left-color: var(--red); }
    .finding-item.HIGH     { border-left-color: var(--orange); }
    .finding-item.WARNING  { border-left-color: var(--yellow); }
    .finding-item.INFO     { border-left-color: var(--green); }

    .fi-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .fi-name {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 12px;
      color: var(--text-primary);
      flex: 1;
    }

    .fi-copy-btn {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .fi-copy-btn:hover {
      border-color: var(--border-bright);
      color: var(--text-primary);
    }

    .fi-loc {
      color: var(--text-muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .fi-val {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-code);
      background: rgba(168,196,232,0.06);
      border: 1px solid rgba(168,196,232,0.1);
      padding: 2px 7px;
      border-radius: var(--radius-sm);
      margin-top: 4px;
      display: inline-block;
    }

    .fi-fix {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: #4ade80;
      line-height: 1.5;
    }
    .fi-fix-icon { flex-shrink: 0; font-size: 11px; }

    /* ── Diff ────────────────────────────────────────────────────────── */
    .diff-block {
      margin-top: 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 9px 11px;
      font-size: 11px;
    }

    .diff-title {
      color: var(--text-muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      margin-bottom: 6px;
      font-family: var(--font-head);
    }

    .diff-fixed { color: var(--green); padding: 2px 0; }
    .diff-new   { color: var(--red);   padding: 2px 0; }
    .diff-same  { color: var(--text-muted); padding: 2px 0; }

    /* ── Input area ──────────────────────────────────────────────────── */
    .input-area {
      padding: 10px 12px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: linear-gradient(0deg, rgba(59,130,246,0.03) 0%, transparent 100%);
    }

    .input-wrap {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: flex-end;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 400;
      padding: 9px 12px;
      resize: none;
      min-height: 38px;
      max-height: 96px;
      line-height: 1.5;
    }
    textarea::placeholder { color: var(--text-muted); }

    .btn-send {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(37,99,235,0.35);
    }
    .btn-send:hover {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 4px 16px rgba(59,130,246,0.45);
      transform: translateY(-1px);
    }
    .btn-send:disabled {
      background: var(--bg-elevated);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    .btn-send svg { width: 15px; height: 15px; fill: #fff; }

    .bubble strong { color: #fff; font-weight: 600; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-brand">
      <span class="brand-name">POST<span class="accent">-deploy</span></span>
    </div>
    <div class="header-right">
      <span class="url-pill" id="url-display">—</span>
      <button class="btn-clear" id="btn-clear">Clear</button>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <span class="chip" data-q="any api keys exposed?">🔍 Scan secrets</span>
    <span class="chip" data-q="check geo availability">🌍 Geo check</span>
    <span class="chip" data-q="safe to launch?">🚀 Pre-launch</span>
    <span class="chip" data-q="check germany">🇩🇪 Germany</span>
    <span class="chip" data-q="check europe">🌐 Europe</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="chat-input"
        placeholder="any leaks?  •  check germany  •  safe to launch?"
        rows="1"
      ></textarea>
    </div>
    <button class="btn-send" id="btn-send" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
